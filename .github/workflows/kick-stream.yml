name: Kick.com Loop Streamer

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Start or stop the stream"
        required: true
        default: "start"
        type: choice
        options:
          - start
          - stop
      stream_key:
        description: "Kick stream key or full SRT URL"
        required: false
        type: string
      video_url:
        description: "Video URL (twitch/youtube/mp4/m3u8)"
        required: false
        type: string
      kick_username:
        description: "Kick username (for follower counter + chat overlay)"
        required: false
        type: string
      retrigger_hours:
        description: "Hours before self-retrigger (0=disabled, max 5.5)"
        required: false
        default: "5"
        type: string

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        if: inputs.action == 'start'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          pip install yt-dlp websocket-client

      - name: Stop existing stream
        if: inputs.action == 'stop'
        run: |
          echo "Stopping all processes..."
          pkill -f "ffmpeg" 2>/dev/null || true
          pkill -f "streamlink" 2>/dev/null || true
          pkill -f "get_followers.py" 2>/dev/null || true
          pkill -f "get_chat.py" 2>/dev/null || true
          pkill -f "chunked_stream.py" 2>/dev/null || true
          touch /tmp/kick-stream.stop
          echo "Stream stopped."

      - name: Prepare output URL
        if: inputs.action == 'start'
        id: output
        run: |
          KEY="${{ inputs.stream_key }}"
          if [[ "$KEY" == srt://* ]]; then
            echo "type=srt" >> $GITHUB_OUTPUT
            echo "url=$KEY" >> $GITHUB_OUTPUT
          else
            echo "type=rtmp" >> $GITHUB_OUTPUT
            echo "url=rtmp://push.kick.com/live/$KEY" >> $GITHUB_OUTPUT
          fi

      - name: Start follower tracker
        if: inputs.action == 'start' && inputs.kick_username != ''
        run: |
          mkdir -p /tmp/kick-stream
          echo "LIVE" > /tmp/kick-stream/follower_count.txt
          python3 get_followers.py "${{ inputs.kick_username }}" /tmp/kick-stream/follower_count.txt &

      - name: Start chat tracker
        if: inputs.action == 'start' && inputs.kick_username != ''
        run: |
          mkdir -p /tmp/kick-stream
          : > /tmp/kick-stream/chat_messages.txt
          python3 get_chat.py "${{ inputs.kick_username }}" /tmp/kick-stream/chat_messages.txt &

      - name: Stream to Kick.com (chunked download + loop)
        if: inputs.action == 'start'
        env:
          OUTPUT_URL: ${{ steps.output.outputs.url }}
          OUTPUT_TYPE: ${{ steps.output.outputs.type }}
          KICK_USERNAME: ${{ inputs.kick_username }}
          RETRIGGER_HOURS: ${{ inputs.retrigger_hours }}
        run: |
          chmod +x chunked_stream.py get_followers.py get_chat.py

          RETRIGGER_SECS=$((${RETRIGGER_HOURS:-5} * 3600))
          START_TIME=$(date +%s)

          FOLLOWER_FILE="/tmp/kick-stream/follower_count.txt"
          CHAT_FILE="/tmp/kick-stream/chat_messages.txt"
          [[ ! -f "$FOLLOWER_FILE" ]] && echo "LIVE" > "$FOLLOWER_FILE"
          [[ ! -f "$CHAT_FILE" ]] && : > "$CHAT_FILE"

          DRAWTEXT="drawtext=textfile=${FOLLOWER_FILE}:reload=30:fontcolor=white:fontsize=28:font=Sans:x=20:y=20:box=1:boxcolor=black@0.6:boxborderw=12,drawtext=textfile=${CHAT_FILE}:reload=5:fontcolor=white:fontsize=22:font=Sans:x=w-tw-20:y=h-th-20:box=1:boxcolor=black@0.7:boxborderw=10"

          export OVERLAY_FILTER="$DRAWTEXT"

          echo "========================================="
          echo " Kick.com Chunked Streamer"
          echo " Output:  ${{ steps.output.outputs.type }}"
          echo " Video:   ${{ inputs.video_url }}"
          echo " User:    ${KICK_USERNAME:-none}"
          echo " Mode:    30-min chunks, no gaps"
          echo "========================================="

          rm -f /tmp/kick-stream.stop
          mkdir -p /tmp/kick-stream/chunks

          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))

            if [[ $RETRIGGER_SECS -gt 0 && $ELAPSED -ge $RETRIGGER_SECS ]]; then
              echo "Retrigger threshold reached (${RETRIGGER_HOURS}h). Re-dispatching workflow..."
              curl -X POST \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow_id }}/dispatches" \
                -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"action\":\"start\",\"stream_key\":\"${{ inputs.stream_key }}\",\"video_url\":\"${{ inputs.video_url }}\",\"kick_username\":\"${{ inputs.kick_username }}\",\"retrigger_hours\":\"${{ inputs.retrigger_hours }}\"}}"
              echo "Re-dispatch sent. This run will now stop."
              exit 0
            fi

            if [[ -f /tmp/kick-stream.stop ]]; then
              echo "Stop file detected. Exiting."
              break
            fi

            echo "[$(date)] Starting chunked stream..."
            python3 chunked_stream.py "${{ inputs.video_url }}" "$OUTPUT_URL"
            EXIT_CODE=$?

            if [[ -f /tmp/kick-stream.stop ]]; then
              echo "Stop file detected after stream exit."
              break
            fi

            if [[ $EXIT_CODE -eq 0 ]]; then
              echo "[$(date)] Stream completed normally."
              break
            fi

            echo "[$(date)] Stream exited (code $EXIT_CODE). Restarting in 5s..."
            sleep 5
          done

          echo "Stream ended."

      - name: Cleanup
        if: always()
        run: |
          pkill -f "ffmpeg" 2>/dev/null || true
          pkill -f "streamlink" 2>/dev/null || true
          pkill -f "get_followers.py" 2>/dev/null || true
          pkill -f "get_chat.py" 2>/dev/null || true
          pkill -f "chunked_stream.py" 2>/dev/null || true
          echo "Cleanup done."
